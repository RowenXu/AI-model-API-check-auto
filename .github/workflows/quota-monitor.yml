name: 💰 API Quota Monitor

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:
    inputs:
      debug:
        description: 'Enable debug output'
        type: boolean
        default: false

jobs:
  monitor:
    name: Collect API Quotas
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install requests aliyun-python-sdk-core aliyun-python-sdk-bssopenapi

      - name: Run quota monitor
        id: monitor
        env:
          OPENAI_API_KEY:           ${{ secrets.OPENAI_API_KEY }}
          GH_COPILOT_TOKEN:         ${{ secrets.GH_COPILOT_TOKEN }}
          GH_COPILOT_ORG:           ${{ secrets.GH_COPILOT_ORG }}
          ALIYUN_ACCESS_KEY_ID:     ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          ALIYUN_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
          KIMI_API_KEY:             ${{ secrets.KIMI_API_KEY }}
          DEEPSEEK_API_KEY:         ${{ secrets.DEEPSEEK_API_KEY }}
          MIMO_API_KEY:             ${{ secrets.MIMO_API_KEY }}
          ZAI_API_KEY:              ${{ secrets.ZAI_API_KEY }}
          DEBUG: ${{ inputs.debug || 'false' }}
        run: python scripts/quota_monitor.py

      - name: Commit updated report
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/quota_report.json
          git diff --staged --quiet || (
            git commit -m "chore(quota): update report $(date -u +'%Y-%m-%d %H:%M UTC')" &&
            git push
          )

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: quota-report-${{ github.run_id }}
          path: data/quota_report.json
          retention-days: 90
